<!-- 
  @description 
  Vista de gestión de "Servicios de Reserva". 
  Presenta una interfaz de usuario para listar, crear, editar y eliminar servicios asociados a una reserva.

  @componente-dependencias
  - Angular Material: MatButton, MatIcon, MatTable, MatPaginator, MatProgressSpinner.
  - Angular Common: Directiva @if / @else para control de flujo de carga.

  @secciones_principales
  1. Cabecera (Encabezado y botón de acción "Agregar").
  2. Estado de Carga (Spinner visual durante peticiones asíncronas).
  3. Tabla de Datos (Visualización de la lista de servicios con paginación).

  @metodos_vinculados
  - nuevo(): Abre el formulario/diálogo para crear un registro.
  - nombreServicio(id): Función que mapea el ID del servicio a su nombre legible.
  - editar(r): Envía el objeto de la fila actual para su modificación.
  - eliminar(r): Dispara el proceso de borrado del registro seleccionado.

  @datos_entrada
  - loading (boolean): Controla la visibilidad del spinner.
  - dataSource (MatTableDataSource): Fuente de datos para la tabla.
  - displayedColumns (string[]): Define el orden y las columnas a mostrar.
-->
<div class="page-head">
  <h1>Servicios de Reserva</h1>
  <button mat-flat-button color="primary" type="button" (click)="nuevo()">
    <mat-icon>add</mat-icon>
    Agregar
  </button>
</div>

@if (loading) {
  <div class="loading">
    <mat-spinner />
  </div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">

      <ng-container matColumnDef="servicio">
        <th mat-header-cell *matHeaderCellDef>Servicio</th>
        <td mat-cell *matCellDef="let r">{{ nombreServicio(r.id_servicios) }}</td>
      </ng-container>

      <ng-container matColumnDef="cantidad">
        <th mat-header-cell *matHeaderCellDef>Cantidad</th>
        <td mat-cell *matCellDef="let r">{{ r.cantidad }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button type="button" (click)="editar(r)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button type="button" (click)="eliminar(r)" aria-label="Eliminar" class="action-delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}
